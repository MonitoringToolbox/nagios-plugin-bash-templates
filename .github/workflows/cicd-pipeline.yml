name: CICD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      slack-notify:
        description: 'Notify Slack'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
    SLACK_NOTIFY: true

permissions: read-all

jobs:
  shellcheck:
    name: ShellCheck
    uses: WolfSoftware/reusable-workflows/.github/workflows/reusable-shellcheck.yml@master

  set-slack-notify:
    name: Set Slack Notify
    runs-on: ubuntu-latest
    outputs:
      slack-notify: ${{ steps.set-slack-notify.outputs.slack-notify }}
    steps:
      - name: Set Slack Notify
        id: set-slack-notify
        run: |
          echo "slack-notify=${{ github.event.inputs.slack-notify || env.SLACK_NOTIFY }}" >> "${GITHUB_OUTPUT}"

  slack-workflow-status:
    if: always() && ${{ github.actor != 'dependabot[bot]' }}
    name: Slack Post Workflow Notification
    needs:
      - shellcheck
      - set-slack-notify
    uses: WolfSoftware/reusable-workflows/.github/workflows/reusable-slack.yml@master
    with:
      slack_notify: ${{ needs.set-slack-notify.outputs.slack-notify }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
